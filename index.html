<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>FURIA Zone - Chat da Torcida</title>
    
    <!-- Google Fonts: Inter -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="/CSS/style.css" />
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            fontFamily: {
              sans: ['Inter', 'sans-serif'],
            }
          }
        }
      }
    </script>
  </head>

  <body class="text-white flex flex-col min-h-screen relative overflow-x-hidden antialiased bg-[#09090b]">
    <!-- Animated Background Layer -->
    <div class="fixed inset-0 z-0 overflow-hidden pointer-events-none">
      <div class="absolute top-[-20%] left-[-10%] w-[50%] h-[50%] rounded-full bg-purple-900/20 blur-[120px] mix-blend-screen"></div>
      <div class="absolute bottom-[-20%] right-[-10%] w-[60%] h-[60%] rounded-full bg-indigo-900/10 blur-[120px] mix-blend-screen"></div>
    </div>

    <!-- Header Glassmorphism -->
    <header class="bg-black/30 backdrop-blur-xl border-b border-white/5 p-4 flex items-center justify-between shadow-lg z-10 sticky top-0">
      <div class="flex items-center space-x-3">
        <img src="IMGS/furia-seeklogo.png" alt="FURIA Logo" class="w-10 h-10 drop-shadow-md" />
        <h1 class="text-xl font-bold tracking-wide">FURIA <span class="text-purple-500">Zone</span></h1>
      </div>
      <div class="flex items-center space-x-6">
        <span class="flex items-center text-xs font-medium text-emerald-400 bg-emerald-400/10 px-3 py-1 rounded-full border border-emerald-400/20 shadow-[0_0_10px_rgba(52,211,153,0.2)]">
          <span class="w-2 h-2 rounded-full bg-emerald-400 mr-2 animate-pulse"></span> ONLINE
        </span>
      </div>
    </header>

    <main class="flex-1 flex flex-col lg:flex-row items-center lg:items-stretch justify-center p-4 lg:p-8 gap-6 lg:gap-8 z-10 w-full max-w-7xl mx-auto">
      
      <!-- Painel Pantera Bot -->
      <div
        id="chat-window"
        class="fade-in bg-black/40 backdrop-blur-2xl border border-white/10 text-white rounded-3xl shadow-[0_8px_32px_rgba(0,0,0,0.5)] w-full max-w-md h-[600px] flex flex-col overflow-hidden relative group"
      >
        <!-- Card Glow Effect -->
        <div class="absolute inset-0 bg-gradient-to-b from-purple-500/5 to-transparent pointer-events-none rounded-3xl"></div>
        
        <div class="bg-purple-900/20 backdrop-blur-md border-b border-white/5 p-4 flex items-center justify-center gap-2 font-bold text-lg shadow-sm">
          <span>Pantera Bot 🐾</span>
        </div>
        
        <div
          id="chat-messages"
          class="custom-scrollbar flex-1 p-5 overflow-y-auto space-y-4"
        ></div>
        
        <div class="p-4 border-t border-white/5 bg-black/20 backdrop-blur-md">
          <div class="flex relative rounded-xl shadow-inner bg-black/50 border border-white/10 focus-within:border-purple-500/50 focus-within:ring-1 focus-within:ring-purple-500/50 transition-all">
            <input
              type="text"
              id="chat-input"
              class="flex-1 bg-transparent p-3 lg:p-4 rounded-l-xl focus:outline-none text-white placeholder-gray-500 text-sm"
              placeholder="Digite sua mensagem pro bot..."
            />
            <button
              id="send-btn"
              class="bg-purple-600 px-6 rounded-r-xl hover:bg-purple-500 transition-colors font-semibold flex items-center justify-center group-hover:shadow-[0_0_15px_rgba(147,51,234,0.4)]"
            >
              <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 transform rotate-90" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 19l9 2-9-18-9 18 9-2zm0 0v-8" />
              </svg>
            </button>
          </div>
        </div>
      </div>

      <!-- Painel Torcida FURIA -->
      <div
        class="fade-in bg-black/40 backdrop-blur-2xl border border-white/10 text-white rounded-3xl shadow-[0_8px_32px_rgba(0,0,0,0.5)] w-full max-w-md h-[600px] flex flex-col overflow-hidden relative"
      >
        <div class="absolute inset-0 bg-gradient-to-b from-blue-500/5 to-transparent pointer-events-none rounded-3xl"></div>
        
        <div class="bg-white/5 backdrop-blur-md border-b border-white/5 p-4 flex items-center justify-center gap-2 font-bold text-lg shadow-sm">
          🔥 Torcida FURIA
        </div>
        
        <div
          id="torcida-messages"
          class="custom-scrollbar flex-1 p-5 overflow-y-auto space-y-4"
        ></div>
      </div>
    </main>

    <footer class="bg-black/50 backdrop-blur-xl border-t border-white/5 p-6 text-center text-gray-500 text-sm z-10 mt-auto">
      <p class="mb-2">© 2026 FURIA Zone | Feito com 🖤 para os FURIOSOS</p>
      <div class="flex justify-center space-x-6">
        <a href="https://twitter.com/FURIA" target="_blank" class="hover:text-purple-400 transition-colors">Twitter</a>
        <a href="https://www.instagram.com/furiagg/" target="_blank" class="hover:text-purple-400 transition-colors">Instagram</a>
        <a href="https://discord.gg/furia" target="_blank" class="hover:text-purple-400 transition-colors">Discord</a>
      </div>
    </footer>
    
    <script src="/JS/script.js"></script>
    <script src="/JS/simulador.js"></script>
  </body>
</html>
